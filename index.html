<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Buscador de Pokémon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #f8fafc;
    }

    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .search-container, #result { width: 100%; max-width: 550px; }

    .search-container {
      display: flex;
      margin-bottom: 40px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    input { flex: 1; padding: 12px 16px; border: none; background: transparent; color: white; font-size: 16px; outline: none; }
    /* esse estilo está afetando TODOS os buttons, incluindo o "Limpar" */
    button { padding: 12px 24px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

    /* CARD DESIGN */
    .pokemon-card {
      background: white;
      color: #1e293b;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: cardEnter 0.4s ease-out;
    }

    .pokemon-img { width: 200px; height: 200px; margin: 20px 0; object-fit: contain; }

    /* RESOLVENDO A SOBREPOSIÇÃO */
    .types-container { display: flex; gap: 10px; margin-bottom: 20px; }
    
    .measurements { 
      display: flex; 
      justify-content: center; 
      gap: 40px; 
      margin-bottom: 30px; 
      width: 100%;
      color: #64748b;
      font-weight: 600;
    }

    /* STATUS LARGOS */
    .stats-container { width: 100%; border-top: 1px solid #f1f5f9; padding-top: 10px; }
    .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .stat-name { color: #64748b; text-transform: uppercase; font-size: 12px; font-weight: 700; }
    .stat-value { font-weight: 800; color: #1e293b; }

    .type-badge { padding: 8px 20px; border-radius: 999px; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    .type-water { background-color: #6390F0; color: white; }
    .type-ground { background-color: #E2BF65; color: #333; }

    @keyframes cardEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #history { width: 100%; max-width: 550px; margin-top: 32px; }

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: .06em;
}

.history-header button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.2s;
}

.history-item:hover { background: rgba(255,255,255,0.1); }

.history-item img {
  width: 44px;
  height: 44px;
  object-fit: contain;
}

.history-info {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.history-name {
  font-size: 14px;
  font-weight: 700;
  color: #f8fafc;
}

.history-id {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}

.history-time {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}
  </style>
</head>
<body>
  <h1>🔍 Buscar Pokémon</h1>
  <div class="search-container">
    <input type="text" id="input" placeholder="Ex: pikachu" />
    <button id="btn">Buscar</button>
  </div>
  <div id="result"></div>
  <div id="history"></div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
