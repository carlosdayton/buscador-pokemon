<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Buscador de Pokémon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');

:root {
  --color-black: #000000;
  --color-white: #FFFFFF;
  --color-bg: #F5F0E8;
  --color-accent: #ADFF2F;
  --color-error: #FF4444;
  --shadow-sm: 3px 3px 0px var(--color-black);
  --shadow-md: 5px 5px 0px var(--color-black);
  --shadow-lg: 8px 8px 0px var(--color-black);
  --border: 3px solid var(--color-black);
  --border-thin: 2px solid var(--color-black);
  --font-family: 'Space Grotesk', 'Inter', sans-serif;
  --font-weight-bold: 700;
  --font-weight-black: 900;
  --transition-press: transform 0.08s ease, box-shadow 0.08s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-family);
  background-color: #ADFF2F;
  background-image: radial-gradient(circle, #000 1.5px, transparent 1.5px);
  background-size: 24px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: var(--color-black);
}

h1 {
  font-size: 2rem;
  font-weight: var(--font-weight-black);
  margin-bottom: 32px;
  letter-spacing: -0.02em;
}

/* SEARCH BAR */
.search-container, #result { width: 100%; max-width: 550px; }

.search-container {
  display: flex;
  gap: 8px;
  margin-bottom: 40px;
  background: var(--color-accent);
  padding: 8px;
  border: var(--border);
  box-shadow: var(--shadow-md);
}

input {
  flex: 1;
  padding: 12px 16px;
  border: none;
  background: transparent;
  color: var(--color-black);
  font-size: 16px;
  font-weight: var(--font-weight-bold);
  font-family: var(--font-family);
  outline: none;
}

input::placeholder { color: rgba(0,0,0,0.4); }

#btn {
  padding: 12px 24px;
  background: var(--color-black);
  color: var(--color-white);
  border: var(--border);
  box-shadow: var(--shadow-md);
  font-weight: var(--font-weight-bold);
  font-family: var(--font-family);
  font-size: 15px;
  cursor: pointer;
  transition: var(--transition-press);
}
#btn:active { transform: translate(5px, 5px); box-shadow: 0 0 0 var(--color-black); }

/* POKEMON CARD */
.pokemon-card {
  background: var(--color-white);
  border: var(--border);
  box-shadow: var(--shadow-lg);
  border-radius: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: cardEnter 0.3s ease-out;
  overflow: hidden;
}

.pokemon-card__header {
  width: 100%;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: var(--border);
  background: #FFE500;
}

.pokemon-card__id {
  font-size: 14px;
  font-weight: var(--font-weight-black);
  opacity: 0.6;
}

.pokemon-card__name {
  font-size: 1.6rem;
  font-weight: var(--font-weight-black);
  letter-spacing: -0.02em;
}

.pokemon-img-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 16px;
  border-bottom: var(--border);
  background: #f9f5ec;
}

.pokemon-img {
  width: 220px;
  height: 220px;
  object-fit: contain;
  image-rendering: auto;
}

/* TYPES */
.types-container {
  display: flex;
  gap: 8px;
  padding: 16px 24px;
  border-bottom: var(--border);
  width: 100%;
  justify-content: center;
}

.type-badge {
  padding: 4px 12px;
  border: var(--border-thin);
  border-radius: 0;
  font-size: 12px;
  font-weight: var(--font-weight-black);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: #A8A878;
  color: #000;
}

.type-normal   { background: #A8A878; color: #000; }
.type-fire     { background: #FF4500; color: #fff; }
.type-water    { background: #4169E1; color: #fff; }
.type-electric { background: #FFD700; color: #000; }
.type-grass    { background: #32CD32; color: #000; }
.type-ice      { background: #00CED1; color: #000; }
.type-fighting { background: #DC143C; color: #fff; }
.type-poison   { background: #9400D3; color: #fff; }
.type-ground   { background: #DAA520; color: #000; }
.type-flying   { background: #87CEEB; color: #000; }
.type-psychic  { background: #FF1493; color: #fff; }
.type-bug      { background: #6B8E23; color: #fff; }
.type-rock     { background: #808080; color: #fff; }
.type-ghost    { background: #483D8B; color: #fff; }
.type-dragon   { background: #4B0082; color: #fff; }
.type-dark     { background: #2F2F2F; color: #fff; }
.type-steel    { background: #B0C4DE; color: #000; }
.type-fairy    { background: #FF69B4; color: #000; }

/* MEASUREMENTS */
.measurements {
  display: flex;
  justify-content: center;
  gap: 0;
  width: 100%;
  border-bottom: var(--border);
}

.measurement-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  border-right: var(--border);
}

.measurement-item:last-child { border-right: none; }

.measurement-label {
  font-size: 11px;
  font-weight: var(--font-weight-black);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.5;
  margin-bottom: 4px;
}

.measurement-value {
  font-size: 1.1rem;
  font-weight: var(--font-weight-black);
}

/* ABILITIES */
.abilities-container, .weaknesses-container {
  width: 100%;
  padding: 14px 20px;
  border-bottom: var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.section-label {
  font-size: 10px;
  font-weight: var(--font-weight-black);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.5;
  flex-shrink: 0;
  width: 80px;
  padding-top: 3px;
}

.abilities-list, .weaknesses-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ability-badge {
  padding: 3px 10px;
  border: var(--border-thin);
  background: #f0ece0;
  font-size: 11px;
  font-weight: var(--font-weight-bold);
  text-transform: capitalize;
}

.ability-hidden {
  font-size: 9px;
  font-weight: var(--font-weight-black);
  background: var(--color-black);
  color: var(--color-white);
  padding: 1px 5px;
  margin-left: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.no-weakness {
  font-size: 11px;
  opacity: 0.4;
  font-weight: var(--font-weight-bold);
}

/* STATS */
.stats-container {
  width: 100%;
  padding: 8px 0 0;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
}

.stat-name {
  width: 110px;
  font-size: 10px;
  font-weight: var(--font-weight-black);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.55;
  flex-shrink: 0;
}

.stat-bar-wrapper {
  flex: 1;
  height: 16px;
  border: var(--border-thin);
  background: #f0ece0;
  overflow: hidden;
  position: relative;
}

.stat-bar {
  height: 100%;
  border-radius: 0;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* cores por stat */
.stat-row:nth-child(1) .stat-bar { background: #FF4444; }  /* hp      — vermelho */
.stat-row:nth-child(2) .stat-bar { background: #FF8C00; }  /* attack  — laranja */
.stat-row:nth-child(3) .stat-bar { background: #4169E1; }  /* defense — azul */
.stat-row:nth-child(4) .stat-bar { background: #9400D3; }  /* sp.atk  — roxo */
.stat-row:nth-child(5) .stat-bar { background: #32CD32; }  /* sp.def  — verde */
.stat-row:nth-child(6) .stat-bar { background: #00CED1; }  /* speed   — ciano */

.stat-value {
  width: 36px;
  text-align: right;
  font-size: 14px;
  font-weight: var(--font-weight-black);
  flex-shrink: 0;
}

/* LOADER */
@keyframes cardEnter { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.loader { border: 3px solid var(--color-black); border-top-color: transparent; border-radius: 0; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR CARD */
.error-card {
  width: 100%;
  max-width: 550px;
  border: var(--border);
  box-shadow: var(--shadow-lg);
  background: var(--color-error);
  padding: 24px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: cardEnter 0.3s ease-out;
}

.error-icon {
  font-size: 1.5rem;
  font-weight: var(--font-weight-black);
  color: var(--color-white);
}

.error-message {
  font-size: 1rem;
  font-weight: var(--font-weight-bold);
  color: var(--color-white);
}

/* HISTORY */
#history { width: 100%; max-width: 550px; margin-top: 32px; }

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 12px;
  font-weight: var(--font-weight-black);
  color: var(--color-black);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.6;
}

.history-header button {
  background: var(--color-white);
  border: var(--border-thin);
  box-shadow: var(--shadow-sm);
  color: var(--color-black);
  padding: 4px 12px;
  font-size: 11px;
  font-weight: var(--font-weight-bold);
  font-family: var(--font-family);
  cursor: pointer;
  transition: var(--transition-press);
  opacity: 1;
}

.history-header button:active {
  transform: translate(3px, 3px);
  box-shadow: 0 0 0 var(--color-black);
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--color-white);
  border: var(--border-thin);
  box-shadow: 3px 3px 0 var(--color-black);
  padding: 10px 16px;
  cursor: pointer;
  transition: var(--transition-press);
}

.history-item:hover {
  transform: translate(-2px, -2px);
  box-shadow: 5px 5px 0 var(--color-black);
}

.history-item:active {
  transform: translate(3px, 3px);
  box-shadow: 0 0 0 var(--color-black);
}

.history-item img {
  width: 44px;
  height: 44px;
  object-fit: contain;
  image-rendering: pixelated;
}

.history-info {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.history-name {
  font-size: 14px;
  font-weight: var(--font-weight-black);
  color: var(--color-black);
}

.history-id {
  font-size: 12px;
  color: var(--color-black);
  opacity: 0.4;
}

.history-time {
  font-size: 12px;
  color: var(--color-black);
  opacity: 0.3;
}
/* SHINY & FAV BUTTONS */
.pokemon-img-wrapper { position: relative; }

.shiny-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: var(--color-white);
  border: var(--border-thin);
  box-shadow: var(--shadow-sm);
  padding: 4px 10px;
  font-size: 11px;
  font-weight: var(--font-weight-black);
  font-family: var(--font-family);
  cursor: pointer;
  transition: var(--transition-press);
  color: var(--color-black);
}
.shiny-btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 #000; }
.shiny-btn--active { background: #FFD700; }

.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.pokemon-card__genus {
  font-size: 10px;
  font-weight: var(--font-weight-bold);
  opacity: 0.6;
  text-transform: capitalize;
}

.fav-btn {
  background: transparent;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  transition: transform 0.15s ease;
  padding: 0;
}
.fav-btn:hover { transform: scale(1.2); }
.fav-btn--active { color: #FFD700; text-shadow: 0 0 4px rgba(0,0,0,0.3); }

/* FLAVOR TEXT */
.flavor-text {
  width: 100%;
  padding: 14px 24px;
  border-bottom: var(--border);
  font-size: 13px;
  font-style: italic;
  line-height: 1.5;
  opacity: 0.75;
  text-align: center;
}

/* RADAR CHART */
.radar-wrapper {
  width: 100%;
  padding: 16px 24px;
  border-bottom: var(--border);
  display: flex;
  justify-content: center;
}

.radar-chart {
  width: 200px;
  height: 200px;
  color: var(--color-black);
}

/* STAT BAR ANIMATION */
@keyframes statGrow {
  from { width: 0% !important; }
}
.stat-bar { animation: statGrow 0.6s cubic-bezier(0.4, 0, 0.2, 1) both; }
.stat-row:nth-child(1) .stat-bar { animation-delay: 0.05s; }
.stat-row:nth-child(2) .stat-bar { animation-delay: 0.10s; }
.stat-row:nth-child(3) .stat-bar { animation-delay: 0.15s; }
.stat-row:nth-child(4) .stat-bar { animation-delay: 0.20s; }
.stat-row:nth-child(5) .stat-bar { animation-delay: 0.25s; }
.stat-row:nth-child(6) .stat-bar { animation-delay: 0.30s; }

/* TOP BAR */
.top-bar {
  width: 100%;
  max-width: 550px;
  display: flex;
  justify-content: flex-end;
  margin-bottom: 12px;
}

.icon-btn {
  background: var(--color-white);
  border: var(--border-thin);
  box-shadow: var(--shadow-sm);
  font-size: 18px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: var(--transition-press);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }

/* RANDOM BUTTON */
#random-btn {
  padding: 12px 14px;
  background: var(--color-white);
  color: var(--color-black);
  border: var(--border);
  box-shadow: var(--shadow-sm);
  font-size: 18px;
  cursor: pointer;
  transition: var(--transition-press);
}
#random-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }

/* DARK MODE */
:root.dark {
  --color-black: #f0e8d0;
  --color-white: #16213e;
  --color-bg: #0d0d1a;
  --color-accent: #c9a800;
  --color-error: #cc2222;
  --shadow-sm: 3px 3px 0px #f0e8d0;
  --shadow-md: 5px 5px 0px #f0e8d0;
  --shadow-lg: 8px 8px 0px #f0e8d0;
  --border: 3px solid #f0e8d0;
  --border-thin: 2px solid #f0e8d0;
}

:root.dark body {
  background-color: #1a1200;
  background-image: radial-gradient(circle, #f0e8d0 1.5px, transparent 1.5px);
  color: #f0e8d0;
}

:root.dark .pokemon-card { background: #1e1e32; color: #f0e8d0; }
:root.dark .pokemon-img-wrapper { background: #0d0d1a; }
:root.dark .stat-bar-wrapper { background: #2a2a45; }
:root.dark .ability-badge { background: #2a2a45; color: #f0e8d0; border-color: #f0e8d0; }
:root.dark .measurement-label { color: #f0e8d0; }
:root.dark .measurement-value { color: #f0e8d0; }
:root.dark .stat-name { color: #f0e8d0; }
:root.dark .stat-value { color: #f0e8d0; }
:root.dark .section-label { color: #f0e8d0; }
:root.dark .history-item { background: #1e1e32; color: #f0e8d0; }
:root.dark .history-name { color: #f0e8d0; }
:root.dark .history-id { color: #f0e8d0; }
:root.dark .history-time { color: #f0e8d0; }
:root.dark .history-header { color: #f0e8d0; }
:root.dark .history-header button { background: #1e1e32; color: #f0e8d0; }
:root.dark input { color: #f0e8d0; }
:root.dark input::placeholder { color: rgba(240,232,208,0.35); }
:root.dark .icon-btn { background: #1e1e32; color: #f0e8d0; }
:root.dark #random-btn { background: #1e1e32; color: #f0e8d0; }
:root.dark h1 { color: #f0e8d0; }

/* RESPONSIVIDADE MOBILE */
@media (max-width: 600px) {
  body { padding: 20px 12px; }

  h1 { font-size: 1.4rem; margin-bottom: 20px; }

  .search-container, #result, #history, .top-bar { max-width: 100%; }

  input { font-size: 14px; padding: 10px 12px; }

  #btn { padding: 10px 16px; font-size: 13px; }

  #random-btn { padding: 10px 12px; }

  .pokemon-card__name { font-size: 1.2rem; }

  .pokemon-img { width: 160px; height: 160px; }

  .stat-name { width: 80px; font-size: 9px; }

  .stat-value { width: 28px; font-size: 12px; }

  .section-label { width: 70px; font-size: 9px; }

  .measurement-item { padding: 12px 8px; }
}

  </style>
</head>
<body>
  <h1>🔍 Buscar Pokémon</h1>
  <div class="top-bar">
    <button id="theme-btn" class="icon-btn" title="Alternar tema">🌙</button>
  </div>
  <div class="search-container">
    <input type="text" id="input" placeholder="Nome ou número (ex: pikachu, 25)" />
    <button id="random-btn" title="Pokémon aleatório">🎲</button>
    <button id="btn">Buscar</button>
  </div>
  <div id="result"></div>
  <div id="history"></div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
