<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0f;
      --bg-card:      rgba(255,255,255,0.04);
      --bg-card-hov:  rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.08);
      --border-hov:   rgba(255,255,255,0.18);
      --text-primary: #f0f0f8;
      --text-secondary: rgba(240,240,248,0.5);
      --text-muted:   rgba(240,240,248,0.3);
      --accent:       #7c6af7;
      --accent-2:     #e96df0;
      --glow:         rgba(124,106,247,0.35);
      --font-sans:    'Inter', system-ui, sans-serif;
      --font-display: 'Syne', 'Inter', sans-serif;
      --radius-sm:    8px;
      --radius-md:    16px;
      --radius-lg:    24px;
      --radius-xl:    32px;
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* LIGHT MODE */
    :root.light {
      --bg:           #f0eff8;
      --bg-card:      rgba(255,255,255,0.75);
      --bg-card-hov:  rgba(255,255,255,0.92);
      --border:       rgba(0,0,0,0.07);
      --border-hov:   rgba(0,0,0,0.14);
      --text-primary: #12111a;
      --text-secondary: rgba(18,17,26,0.55);
      --text-muted:   rgba(18,17,26,0.35);
      --accent:       #6455e8;
      --accent-2:     #c44dc9;
      --glow:         rgba(100,85,232,0.22);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      transition: background 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    /* Ambient glow background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.45;
      transition: opacity 0.3s ease;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,106,247,0.4) 0%, transparent 70%);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(233,109,240,0.3) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }
    :root.light body::before { opacity: 0.2; }
    :root.light body::after  { opacity: 0.15; }

    /* ─── LAYOUT WRAPPER ─────────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── HEADER ─────────────────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-logo__title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .app-logo__subtitle {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── THEME TOGGLE ───────────────────────────────────────────────── */
    #theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s, border 0.2s, transform 0.2s;
      color: var(--text-primary);
      flex-shrink: 0;
    }
    #theme-btn:hover {
      background: var(--bg-card-hov);
      border-color: var(--border-hov);
      transform: rotate(20deg);
    }

    /* ─── SEARCH BAR ─────────────────────────────────────────────────── */
    .search-container {
      display: flex;
      gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(24px);
      padding: 8px 8px 8px 20px;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .search-container:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      min-width: 0;
    }
    #input::placeholder { color: var(--text-muted); }

    .search-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #random-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border 0.2s, transform 0.15s;
      color: var(--text-primary);
    }
    #random-btn:hover {
      background: var(--bg-card-hov);
      border-color: var(--border-hov);
      transform: rotate(30deg);
    }

    #btn {
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px var(--glow);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    #btn:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px var(--glow); }
    #btn:active { transform: translateY(0); opacity: 1; }

    /* ─── GLASS CARD MIXIN ───────────────────────────────────────────── */
    .glass {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }

    /* ─── LOADER ─────────────────────────────────────────────────────── */
    .loader-wrap {
      display: flex;
      justify-content: center;
      padding: 48px 0;
    }
    .loader {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── ERROR CARD ─────────────────────────────────────────────────── */
    .error-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-md);
      animation: fadeUp 0.3s var(--ease-out);
    }
    .error-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(239,68,68,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .error-message {
      font-size: 14px;
      font-weight: 500;
      color: #f87171;
    }

    /* ─── POKEMON CARD ───────────────────────────────────────────────── */
    .pokemon-card {
      animation: fadeUp 0.45s var(--ease-out);
      overflow: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(24px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero section */
    .pokemon-card__hero {
      position: relative;
      overflow: hidden;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
    }

    .pokemon-card__hero-bg {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      transition: background 0.4s ease;
    }
    .pokemon-card__hero-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 65% 40%, var(--hero-color, rgba(124,106,247,0.4)) 0%, transparent 65%);
      pointer-events: none;
    }

    .pokemon-card__img-wrap {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-52%);
    }
    .pokemon-img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 16px 32px rgba(0,0,0,0.4));
      transition: transform 0.3s var(--ease-out);
    }
    .pokemon-img:hover { transform: scale(1.06) translateY(-4px); }

    .pokemon-card__meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .pokemon-card__id {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .pokemon-card__name {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      text-transform: capitalize;
    }
    .pokemon-card__genus {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .pokemon-card__type-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    /* Shiny button */
    .shiny-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.32);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-sans);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, border 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 2;
    }
    .shiny-btn:hover { background: rgba(0,0,0,0.48); transform: scale(1.04); }
    .shiny-btn--active { background: rgba(255,215,0,0.25); border-color: rgba(255,215,0,0.5); color: #ffd700; }

    /* Fav button */
    .fav-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.32);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 2;
    }
    .fav-btn:hover { background: rgba(0,0,0,0.48); transform: scale(1.1); }
    .fav-btn--active { color: #ffd700; background: rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.4); }

    /* Card body */
    .pokemon-card__body {
      display: flex;
      flex-direction: column;
    }

    /* Divider */
    .card-divider {
      height: 1px;
      background: var(--border);
    }

    /* Flavor text */
    .flavor-text {
      padding: 16px 24px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-secondary);
      font-style: italic;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    /* Info row (height + weight) */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 18px 16px;
    }
    .info-item:first-child { border-right: 1px solid var(--border); }
    .info-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .info-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Section label */
    .section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }
    .section__title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Types + weaknesses badges */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .type-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: capitalize;
      letter-spacing: 0.04em;
      color: #fff;
      opacity: 0.92;
    }
    /* keep same type color classes */
    .type-normal   { background: #9e9e7e; }
    .type-fire     { background: #e8603c; }
    .type-water    { background: #3b7bdd; }
    .type-electric { background: #d4a800; color: #000; }
    .type-grass    { background: #28a745; }
    .type-ice      { background: #00acc1; color: #000; }
    .type-fighting { background: #c62828; }
    .type-poison   { background: #8e24aa; }
    .type-ground   { background: #c8963a; }
    .type-flying   { background: #5b9fc9; }
    .type-psychic  { background: #d81b60; }
    .type-bug      { background: #558b2f; }
    .type-rock     { background: #757575; }
    .type-ghost    { background: #4527a0; }
    .type-dragon   { background: #4a1a8c; }
    .type-dark     { background: #333; }
    .type-steel    { background: #8ea2b0; color: #000; }
    .type-fairy    { background: #e91e8c; }

    /* Type badges in hero (slightly larger) */
    .pokemon-card__type-row .type-badge {
      font-size: 12px;
      padding: 5px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Abilities */
    .ability-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-card-hov);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      text-transform: capitalize;
    }
    .ability-hidden {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--accent);
      color: #fff;
      padding: 2px 5px;
      border-radius: 4px;
    }

    /* Stats */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .stat-name {
      width: 100px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
      color: var(--text-secondary);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .stat-bar-wrapper {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: visible;
      position: relative;
    }
    :root.light .stat-bar-wrapper { background: rgba(0,0,0,0.08); }

    .stat-bar {
      height: 100%;
      border-radius: 999px;
      animation: statGrow 0.7s var(--ease-out) both;
      position: relative;
    }
    .stat-bar::after {
      content: '';
      position: absolute;
      right: -1px; top: -2px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: inherit;
      box-shadow: 0 0 6px 2px currentColor;
      opacity: 0.6;
    }

    @keyframes statGrow { from { width: 0 !important; } }
    .stat-row:nth-child(1) .stat-bar { background: linear-gradient(90deg, #ef4444, #f87171); animation-delay: 0.05s; }
    .stat-row:nth-child(2) .stat-bar { background: linear-gradient(90deg, #f97316, #fb923c); animation-delay: 0.10s; }
    .stat-row:nth-child(3) .stat-bar { background: linear-gradient(90deg, #3b82f6, #60a5fa); animation-delay: 0.15s; }
    .stat-row:nth-child(4) .stat-bar { background: linear-gradient(90deg, #a855f7, #c084fc); animation-delay: 0.20s; }
    .stat-row:nth-child(5) .stat-bar { background: linear-gradient(90deg, #22c55e, #4ade80); animation-delay: 0.25s; }
    .stat-row:nth-child(6) .stat-bar { background: linear-gradient(90deg, #06b6d4, #22d3ee); animation-delay: 0.30s; }

    .stat-value {
      width: 32px;
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    /* Radar */
    .radar-wrapper {
      display: flex;
      justify-content: center;
      padding: 16px 0 4px;
    }
    .radar-chart {
      width: 190px;
      height: 190px;
    }

    /* ─── HISTORY ────────────────────────────────────────────────────── */
    #history { width: 100%; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .history-header__title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    #clear-btn {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-sans);
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.15s, border 0.15s, background 0.15s;
    }
    #clear-btn:hover {
      color: #f87171;
      border-color: rgba(248,113,113,0.4);
      background: rgba(248,113,113,0.06);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.18s, border 0.18s, transform 0.15s;
      backdrop-filter: blur(12px);
    }
    .history-item:hover {
      background: var(--bg-card-hov);
      border-color: var(--border-hov);
      transform: translateX(4px);
    }
    .history-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .history-item img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    .history-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: capitalize;
    }
    .history-id {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    .history-time {
      font-size: 11px;
      color: var(--text-muted);
    }
    .history-arrow {
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.15s;
    }
    .history-item:hover .history-arrow { transform: translateX(3px); color: var(--accent); }

    /* ─── NO WEAKNESS ────────────────────────────────────────────────── */
    .no-weakness {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── MOBILE ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 28px 14px 60px; }

      .pokemon-card__name { font-size: 1.5rem; }
      .pokemon-img { width: 140px; height: 140px; }
      .pokemon-card__hero { min-height: 200px; }
      .pokemon-card__img-wrap { right: 8px; }

      .stat-name { width: 82px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="app-logo">
        <span class="app-logo__title">PokéSearch</span>
        <span class="app-logo__subtitle">Pokédex Explorer</span>
      </div>
      <button id="theme-btn" title="Alternar tema">🌙</button>
    </header>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="input" placeholder="Nome ou número… ex: pikachu, 25" autocomplete="off" />
      <div class="search-actions">
        <button id="random-btn" title="Pokémon aleatório">🎲</button>
        <button id="btn">Buscar</button>
      </div>
    </div>

    <!-- Result -->
    <div id="result"></div>

    <!-- History -->
    <div id="history"></div>

  </div>
